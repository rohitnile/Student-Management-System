<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Student Management System</title>
</head>

<body>

	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
	    <div class="container-fluid">

	        <!-- Heading -->
	        <a class="navbar-brand" href="#">Student Management System</a>

	        <!-- Toggle Button (for mobile) -->
	        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
	            <span class="navbar-toggler-icon"></span>
	        </button>

	        <!-- Menu Links -->
	        <div class="collapse navbar-collapse" id="navbarNav">
	            <ul class="navbar-nav ms-auto">
	                <li class="nav-item">
	                    <a class="nav-link active" th:href="@{/students}">Home</a>
	                </li>
	                <li class="nav-item">
	                    <a class="nav-link" th:href="@{/addStudent}">Add Student</a>
	                </li>
	                <li class="nav-item">
	                    <a class="nav-link" href="#">Contact</a>
	                </li>
	            </ul>
	        </div>

	    </div>
	</nav>

	
	<div class="container">
		
		<div class="text-center">
			<h2>Student List</h2>
		</div>
	
	<table class = "table table-striped table-bordered">
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
			<th>Action</th>
			
        </tr>
    </thead>

    <tbody>
        <tr th:each="student : ${students}">
            <td th:text="${student.firstName}"></td>
            <td th:text="${student.lastName}"></td>
            <td th:text="${student.email}"></td>
			<td> <a th:href="@{students/edit/{id}(id=${student.id})}" class="btn btn-info">Update</a>
				<a th:href="@{students/{id}(id=${student.id})}" class="btn btn-danger">Delete</a>
			</td>
			
			
        </tr>
    </tbody>

</table>

</div>


<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
